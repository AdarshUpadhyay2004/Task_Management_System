{% if request.user.is_authenticated %}
  <div class="relative" id="notification-root" data-list-url="{% url 'notification_list' %}" data-read-url="{% url 'notification_mark_read' %}" data-read-all-url="{% url 'notification_mark_all_read' %}">
    <button
      id="notification-bell"
      type="button"
      class="relative inline-flex h-11 w-11 items-center justify-center rounded-full border border-slate-200 bg-slate-50 text-slate-700 transition hover:border-slate-300 hover:bg-slate-100"
      aria-label="Notifications"
    >
      <span class="text-lg">🔔</span>
      <span id="notification-badge" class="{% if not header_unread_notifications_count %}hidden {% endif %}absolute -right-1 -top-1 min-w-5 rounded-full bg-rose-500 px-1.5 py-0.5 text-center text-xs font-semibold text-white">
        {{ header_unread_notifications_count }}
      </span>
    </button>

    <div id="notification-dropdown" class="hidden absolute right-0 z-50 mt-3 w-96 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl shadow-slate-900/10">
      <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
        <div>
          <p class="text-sm font-semibold text-slate-900">Notifications</p>
          <p class="text-xs text-slate-500">Real-time task alerts</p>
        </div>
        <button id="mark-all-read" type="button" class="text-xs font-medium text-sky-700 hover:text-sky-900">Mark all as read</button>
      </div>

      <div id="notification-empty" class="{% if header_notifications %}hidden {% endif %}px-4 py-8 text-center text-sm text-slate-500">
        No notifications yet.
      </div>

      <div id="notification-list" class="max-h-96 overflow-y-auto">
        {% for notification in header_notifications %}
          <button
            type="button"
            class="notification-item flex w-full gap-3 border-b border-slate-100 px-4 py-3 text-left hover:bg-slate-50 {% if not notification.is_read %}bg-sky-50/70{% endif %}"
            data-id="{{ notification.id }}"
          >
            <span class="mt-1 inline-flex h-2.5 w-2.5 flex-none rounded-full {% if notification.is_read %}bg-slate-300{% else %}bg-sky-500{% endif %}"></span>
            <span class="min-w-0 flex-1">
              <span class="block text-sm text-slate-800">{{ notification.message }}</span>
              <span class="mt-1 block text-xs text-slate-500">{{ notification.created_at|date:"M d, Y H:i" }}</span>
            </span>
          </button>
        {% endfor %}
      </div>
    </div>

    <div id="notification-toast-stack" class="pointer-events-none fixed right-4 top-20 z-50 flex w-80 flex-col gap-3"></div>
  </div>
{% endif %}
